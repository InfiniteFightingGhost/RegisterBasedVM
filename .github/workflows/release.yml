name: Raptor Release & Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build, Pack & Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build Raptor.sln --configuration Release --no-restore /p:TreatWarningsAsErrors=true

    - name: Run unit tests (.NET 8.0)
      run: dotnet test Raptor.Tests/Raptor.Tests.csproj -f net8.0 --configuration Release --no-build --verbosity normal

    - name: Run unit tests (.NET 9.0)
      run: dotnet test Raptor.Tests/Raptor.Tests.csproj -f net9.0 --configuration Release --no-build --verbosity normal

    - name: Run unit tests (.NET 10.0)
      run: dotnet test Raptor.Tests/Raptor.Tests.csproj -f net10.0 --configuration Release --no-build --verbosity normal

    - name: Pack NuGet packages
      run: dotnet pack Raptor.sln --configuration Release --no-build --output ./artifacts

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: ./artifacts/*.nupkg
        generate_release_notes: true

    - name: Publish to NuGet.org (Trusted Publishing / OIDC)
      if: startsWith(github.ref, 'refs/tags/')
      run: dotnet nuget push ./artifacts/*.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate
