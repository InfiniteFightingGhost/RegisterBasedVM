name: Raptor CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x
        cache: true
        cache-dependency-path: '**/*.csproj'

    - name: Restore dependencies
      run: dotnet restore

    - name: Check code formatting
      if: matrix.os == 'ubuntu-latest'
      run: dotnet format Raptor.sln --verify-no-changes --verbosity diagnostic

    - name: Build solution
      run: dotnet build Raptor.sln --configuration Release --no-restore

    - name: Run unit tests (.NET 8.0)
      run: dotnet test Raptor.Tests/Raptor.Tests.csproj -f net8.0 --configuration Release --no-build --verbosity normal

    - name: Run unit tests (.NET 9.0)
      run: dotnet test Raptor.Tests/Raptor.Tests.csproj -f net9.0 --configuration Release --no-build --verbosity normal

    - name: Run unit tests (.NET 10.0)
      run: dotnet test Raptor.Tests/Raptor.Tests.csproj -f net10.0 --configuration Release --no-build --verbosity normal

    - name: Run fast benchmarks
      run: dotnet run --configuration Release --project Raptor.Benchmarks --no-build -- --fast

    - name: Verify NuGet packaging
      if: matrix.os == 'ubuntu-latest'
      run: dotnet pack Raptor.sln --configuration Release --no-build
