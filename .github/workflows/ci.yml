name: Raptor CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x
        cache: true
        cache-dependency-path: '**/*.csproj'

    - name: Restore dependencies
      run: dotnet restore

    - name: Check code formatting
      if: matrix.os == 'ubuntu-latest'
      run: dotnet format Raptor.sln --verify-no-changes --verbosity diagnostic

    - name: Build solution
      run: dotnet build Raptor.sln --configuration Release --no-restore /p:TreatWarningsAsErrors=true

    - name: Audit dependencies for vulnerabilities
      if: matrix.os == 'ubuntu-latest'
      run: dotnet list package --vulnerable --include-transitive

    - name: Run unit tests with Coverage (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        dotnet test Raptor.Tests/Raptor.Tests.csproj -f net8.0 --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage"
        dotnet test Raptor.Tests/Raptor.Tests.csproj -f net9.0 --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage"
        dotnet test Raptor.Tests/Raptor.Tests.csproj -f net10.0 --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage"

    - name: Run unit tests (Windows & macOS)
      if: matrix.os != 'ubuntu-latest'
      run: |
        dotnet test Raptor.Tests/Raptor.Tests.csproj -f net8.0 --configuration Release --no-build --verbosity normal
        dotnet test Raptor.Tests/Raptor.Tests.csproj -f net9.0 --configuration Release --no-build --verbosity normal
        dotnet test Raptor.Tests/Raptor.Tests.csproj -f net10.0 --configuration Release --no-build --verbosity normal

    - name: Generate Code Coverage Report
      if: matrix.os == 'ubuntu-latest'
      uses: danielpalme/ReportGenerator-GitHub-Action@v5
      with:
        reports: '**/coverage.cobertura.xml'
        targetdir: 'coveragereport'
        reporttypes: 'HtmlInline;MarkdownSummary'

    - name: Publish Code Coverage Summary
      if: matrix.os == 'ubuntu-latest'
      run: cat coveragereport/Summary.md >> $GITHUB_STEP_SUMMARY

    - name: Upload Code Coverage HTML Artifact
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: code-coverage-report
        path: coveragereport/

    - name: Run fast benchmarks
      run: dotnet run --configuration Release --project Raptor.Benchmarks --no-build -- --fast

    - name: Verify NuGet packaging
      if: matrix.os == 'ubuntu-latest'
      run: dotnet pack Raptor.sln --configuration Release --no-build

